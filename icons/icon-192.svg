<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <rect width="192" height="192" rx="32" fill="#0D0D0D"/>
  <rect width="192" height="192" rx="32" fill="url(#g)"/>
  <defs>
    <radialGradient id="g" cx="40%" cy="30%">
      <stop offset="0%" stop-color="#1E1E4E"/>
      <stop offset="100%" stop-color="#0D0D0D"/>
    </radialGradient>
  </defs>
  <!-- Fuel pump body -->
  <rect x="52" y="70" width="54" height="76" rx="6" fill="#1E2A4A" stroke="#4A9EFF" stroke-width="2.5"/>
  <!-- Pump screen -->
  <rect x="60" y="80" width="38" height="24" rx="3" fill="#0D1A30" stroke="#4A9EFF" stroke-width="1.5"/>
  <!-- Price display -->
  <text x="79" y="97" font-family="monospace" font-size="10" fill="#00FF88" text-anchor="middle" font-weight="bold">$22.34</text>
  <!-- Fuel type label -->
  <rect x="62" y="112" width="34" height="12" rx="2" fill="#4A9EFF22"/>
  <text x="79" y="121" font-family="sans-serif" font-size="8" fill="#4A9EFF" text-anchor="middle">REGULAR</text>
  <!-- Nozzle arm -->
  <rect x="106" y="78" width="22" height="5" rx="2.5" fill="#4A9EFF"/>
  <rect x="124" y="78" width="5" height="22" rx="2.5" fill="#4A9EFF"/>
  <ellipse cx="126" cy="104" rx="6" ry="6" fill="#00FF88"/>
  <!-- Pump base -->
  <rect x="48" y="146" width="62" height="8" rx="4" fill="#2A2A4A"/>
  <!-- Accent dot -->
  <circle cx="150" cy="48" r="10" fill="#00FF88" opacity="0.9"/>
  <circle cx="150" cy="48" r="5" fill="#0D0D0D"/>
</svg>
