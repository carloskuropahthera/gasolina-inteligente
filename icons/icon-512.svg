<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="80" fill="#0D0D0D"/>
  <rect width="512" height="512" rx="80" fill="url(#g)"/>
  <defs>
    <radialGradient id="g" cx="40%" cy="30%">
      <stop offset="0%" stop-color="#1E1E4E"/>
      <stop offset="100%" stop-color="#0D0D0D"/>
    </radialGradient>
  </defs>
  <!-- Fuel pump body -->
  <rect x="138" y="186" width="142" height="200" rx="16" fill="#1E2A4A" stroke="#4A9EFF" stroke-width="6"/>
  <!-- Pump screen -->
  <rect x="158" y="210" width="102" height="64" rx="8" fill="#0D1A30" stroke="#4A9EFF" stroke-width="4"/>
  <!-- Price display -->
  <text x="209" y="252" font-family="monospace" font-size="28" fill="#00FF88" text-anchor="middle" font-weight="bold">$22.34</text>
  <!-- Fuel type label -->
  <rect x="164" y="282" width="90" height="30" rx="6" fill="#4A9EFF22"/>
  <text x="209" y="302" font-family="sans-serif" font-size="20" fill="#4A9EFF" text-anchor="middle">REGULAR</text>
  <!-- Nozzle arm -->
  <rect x="280" y="206" width="58" height="14" rx="7" fill="#4A9EFF"/>
  <rect x="328" y="206" width="14" height="58" rx="7" fill="#4A9EFF"/>
  <ellipse cx="334" cy="278" rx="16" ry="16" fill="#00FF88"/>
  <ellipse cx="334" cy="278" rx="8" ry="8" fill="#0D0D0D"/>
  <!-- Pump base -->
  <rect x="126" y="386" width="166" height="22" rx="11" fill="#2A2A4A"/>
  <!-- Accent circle -->
  <circle cx="400" cy="126" r="28" fill="#00FF88" opacity="0.9"/>
  <circle cx="400" cy="126" r="14" fill="#0D0D0D"/>
</svg>
